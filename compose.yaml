services:
  api:
    build:
      context: ./backend
    environment:
      HEALTHSCOPE_ENVIRONMENT: development
      HEALTHSCOPE_DATABASE_URL: postgresql+psycopg://healthscope:healthscope-local-only@database:5432/healthscope
    command:
      [
        "sh",
        "-c",
        "alembic upgrade head && uvicorn healthscope.main:app --host 0.0.0.0 --port 8000",
      ]
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: healthscope
      POSTGRES_USER: healthscope
      POSTGRES_PASSWORD: healthscope-local-only
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthscope -d healthscope"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
